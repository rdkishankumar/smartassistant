# Service config
server.port=8083
spring.application.name=smart-assistant
server.servlet.context-path=/assistant-service

# Model config
spring.ai.model.chat=ollama
spring.ai.ollama.chat.options.model=llama3.2:1b
# Optional ? commonly used tuning parameters
#spring.ai.ollama.chat.options.temperature=0.75
# equivalent to max-tokens / num_predict
#spring.ai.ollama.chat.options.num-predict=800
#spring.ai.ollama.chat.options.top-p=0.9
#spring.ai.ollama.chat.options.top-k=40
#spring.ai.ollama.chat.options.repeat-penalty=1.1
#spring.ai.ollama.chat.options.max-tokens=10
#spring.ai.ollama.init.pull-embedding-model=false

# Optional: automatically pull the model on startup if not present
# or: always
#spring.ai.ollama.init.pull-model-strategy=when-missing
#spring.ai.ollama.init.timeout=120s

#Logging
logging.pattern.console=%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n

logging.level.root=INFO
logging.level.com.inchbyinch=DEBUG
logging.level.org.springframework.ai=DEBUG
spring.devtools.add-properties = true
